name = "zwave-js-firmware-updates"
main = "./src/worker.ts"
compatibility_date = "2022-08-28"

[[migrations]]
tag = "v1" # Should be unique for each entry
new_classes = ["RateLimiterDurableObject"]

[[migrations]]
tag = "v2"
deleted_classes = ["RateLimiterDurableObject"]

[[d1_databases]]
binding = "CONFIG_FILES"
database_name = "zwave-js-firmware-updates--prod"
database_id = "6d9a21f3-6886-4d53-b7dc-3b03dad70698"

# Global sustained rate limit shared by all requests.
# Per-edge-location: ~33 req/s sustained across the 60s window, up to 3M req/day.
[[ratelimits]]
name = "RL_GLOBAL"
namespace_id = "1010"
simple = { limit = 2000, period = 60 } # <limit> requests per <period> seconds

# Global burst rate limit shared by all requests.
# Per-edge-location: allows short spikes up to ~100 req/s before the sustained
# ceiling clamps further requests for the remainder of the 60s window.
[[ratelimits]]
name = "RL_BURST"
namespace_id = "1011"
simple = { limit = 1000, period = 10 } # <limit> requests per <period> seconds
