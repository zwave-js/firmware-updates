name: 'Z-Wave Bot: Mirror PR check results to issue'

on:
  workflow_run:
    workflows: ['Test and Release']
    types: [completed]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mirror results to submission issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const action = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/firmware-submission/mirror-pr-checks.js`);
            await action({github, context});
