name: Firmware Submission
description: Submit new firmware update(s) for Z-Wave devices
labels: ['pending-approval']
body:
  - type: markdown
    attributes:
      value: |
        Use this form to submit firmware updates for Z-Wave devices.
        For details, see the [documentation](https://github.com/zwave-js/firmware-updates/blob/main/docs/firmware-files.md).

        Multiple device entries can be used to match multiple devices/models.

        Multiple upgrades can be used to submit multiple firmwares for the same device at once,
        either different versions or different region-specific updates.

  - type: markdown
    attributes:
      value: '## Device 1'

  - type: input
    id: brand
    attributes:
      label: Brand
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      placeholder: e.g. ZWA-002
    validations:
      required: true

  - type: input
    id: manufacturer-id
    attributes:
      label: Manufacturer ID
      description: 4-digit hex, e.g. 0xd3ad
    validations:
      required: true

  - type: input
    id: product-type
    attributes:
      label: Product Type
      description: 4-digit hex, e.g. 0xb33f
    validations:
      required: true

  - type: input
    id: product-id
    attributes:
      label: Product ID
      description: 4-digit hex, e.g. 0xc4f3
    validations:
      required: true

  - type: input
    id: firmware-version-min
    attributes:
      label: Firmware Version (Min)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '0.0'
    validations:
      required: false

  - type: input
    id: firmware-version-max
    attributes:
      label: Firmware Version (Max)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '255.255'
    validations:
      required: false

  - type: markdown
    attributes:
      value: '---'

  - type: markdown
    attributes:
      value: '## Device 2 (optional)'

  - type: input
    id: brand-2
    attributes:
      label: Brand (Device 2)
    validations:
      required: false

  - type: input
    id: model-2
    attributes:
      label: Model (Device 2)
      placeholder: e.g. ZWA-002
    validations:
      required: false

  - type: input
    id: manufacturer-id-2
    attributes:
      label: Manufacturer ID (Device 2)
      description: 4-digit hex, e.g. 0xd3ad
    validations:
      required: false

  - type: input
    id: product-type-2
    attributes:
      label: Product Type (Device 2)
      description: 4-digit hex, e.g. 0xb33f
    validations:
      required: false

  - type: input
    id: product-id-2
    attributes:
      label: Product ID (Device 2)
      description: 4-digit hex, e.g. 0xc4f3
    validations:
      required: false

  - type: input
    id: firmware-version-min-2
    attributes:
      label: Firmware Version (Min) (Device 2)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '0.0'
    validations:
      required: false

  - type: input
    id: firmware-version-max-2
    attributes:
      label: Firmware Version (Max) (Device 2)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '255.255'
    validations:
      required: false

  - type: markdown
    attributes:
      value: '---'

  - type: markdown
    attributes:
      value: '## Device 3 (optional)'

  - type: input
    id: brand-3
    attributes:
      label: Brand (Device 3)
    validations:
      required: false

  - type: input
    id: model-3
    attributes:
      label: Model (Device 3)
      placeholder: e.g. ZWA-002
    validations:
      required: false

  - type: input
    id: manufacturer-id-3
    attributes:
      label: Manufacturer ID (Device 3)
      description: 4-digit hex, e.g. 0xd3ad
    validations:
      required: false

  - type: input
    id: product-type-3
    attributes:
      label: Product Type (Device 3)
      description: 4-digit hex, e.g. 0xb33f
    validations:
      required: false

  - type: input
    id: product-id-3
    attributes:
      label: Product ID (Device 3)
      description: 4-digit hex, e.g. 0xc4f3
    validations:
      required: false

  - type: input
    id: firmware-version-min-3
    attributes:
      label: Firmware Version (Min) (Device 3)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '0.0'
    validations:
      required: false

  - type: input
    id: firmware-version-max-3
    attributes:
      label: Firmware Version (Max) (Device 3)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '255.255'
    validations:
      required: false

  - type: markdown
    attributes:
      value: '---'

  - type: markdown
    attributes:
      value: '## Upgrade 1'

  - type: input
    id: version
    attributes:
      label: Firmware Version
      description: Version of the new firmware, e.g. 1.23
      placeholder: '1.23'
    validations:
      required: true

  - type: textarea
    id: changelog
    attributes:
      label: Changelog
      description: This will be shown to users to explain what's new in this firmware update, so be sure to include any important details or bug fixes. Markdown formatting is supported.
      placeholder: "* Fixed some bugs\n* Added new features\n* Introduced other bugs"
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      description: Can be used to provide a beta firmware to a subset of users for testing before rolling out to everyone.
      options:
        - stable
        - beta
    validations:
      required: true

  - type: dropdown
    id: region
    attributes:
      label: Region
      description: Select a region if this update is region-specific, otherwise leave as "All regions"
      options:
        - All regions
        - europe
        - usa
        - 'australia/new zealand'
        - hong kong
        - india
        - israel
        - russia
        - china
        - japan
        - korea
    validations:
      required: true

  - type: input
    id: if-condition
    attributes:
      label: Upgrade conditions
      description: |
        Can be used to limit upgrade paths to this firmware, e.g. `firmwareVersion >= 1.5 && firmwareVersion < 2.0`  
        [Documentation](https://github.com/zwave-js/firmware-updates/blob/main/docs/firmware-files.md#offer-upgrades-conditionally)
    validations:
      required: false

  - type: dropdown
    id: target-number-0
    attributes:
      label: Target Number (Chip 1)
      description: Select which target number the firmware for chip 1 applies to. Leave this at 0 unless the update must be applied in a different order.
      options:
        - '0'
        - '1'
        - '2'
      default: 0
    validations:
      required: true

  - type: input
    id: url-target-0
    attributes:
      label: Firmware URL (Chip 1)
      description: URL for the firmware for the main chip.
      placeholder: 'https://example.com/firmware/v1.23.ota'
    validations:
      required: true

  - type: dropdown
    id: target-number-1
    attributes:
      label: Target Number (Chip 2)
      description: Select which target number the firmware for chip 2 applies to. Leave this at 1 unless the update must be applied in a different order.
      options:
        - '0'
        - '1'
        - '2'
      default: 1
    validations:
      required: false

  - type: input
    id: url-target-1
    attributes:
      label: Firmware URL (Chip 2)
      description: Optional URL for the firmware for a second chip.
      placeholder: 'https://example.com/firmware/v1.23_target1.ota'
    validations:
      required: false

  - type: dropdown
    id: target-number-2
    attributes:
      label: Target Number (Chip 3)
      description: Select which target number the firmware for chip 3 applies to. Leave this at 2 unless the update must be applied in a different order.
      options:
        - '0'
        - '1'
        - '2'
      default: 2
    validations:
      required: false

  - type: input
    id: url-target-2
    attributes:
      label: Firmware URL (Chip 3)
      description: Optional URL for the firmware for a third chip.
      placeholder: 'https://example.com/firmware/v1.23_target2.ota'
    validations:
      required: false

  - type: markdown
    attributes:
      value: '---'

  - type: markdown
    attributes:
      value: '## Upgrade 2 (optional)'

  - type: input
    id: version-2
