    attributes:
      label: Firmware URL (Target 2) (Upgrade 2)
      placeholder: 'https://example.com/firmware/v1.23_target2.ota'
    validations:
      required: false

  - type: markdown
    attributes:
      value: '## Upgrade 3 (optional)'

  - type: input
    id: version-3
    attributes:
      label: Firmware Version (Upgrade 3)
      placeholder: '1.23'
    validations:
