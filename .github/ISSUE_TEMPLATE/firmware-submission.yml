name: Firmware Submission
description: Submit new firmware update(s) for Z-Wave devices
labels: ['pending-approval']
body:
  - type: markdown
    attributes:
      value: |
        Use this form to submit firmware updates for Z-Wave devices.
        For details, see the [documentation](https://github.com/zwave-js/firmware-updates/blob/main/docs/firmware-files.md).

        **Requirements:**
        - Firmware must be publicly hosted by the device manufacturer
        - All fields marked as required must be filled in
        - Leave optional device and upgrade sections blank unless they apply; if you start filling one in, complete its required fields
        - For more than 3 devices or 4 upgrades in a single file, please submit a PR directly

  - type: markdown
    attributes:
      value: '## Device 1'

  - type: input
    id: brand
    attributes:
      label: Brand
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      placeholder: e.g. ZWA-002
    validations:
      required: true

  - type: input
    id: manufacturer-id
    attributes:
      label: Manufacturer ID
      description: 4-digit hex, e.g. 0xd3ad
    validations:
      required: true

  - type: input
    id: product-type
    attributes:
      label: Product Type
      description: 4-digit hex, e.g. 0xb33f
    validations:
      required: true

  - type: input
    id: product-id
    attributes:
      label: Product ID
      description: 4-digit hex, e.g. 0xc4f3
    validations:
      required: true

  - type: input
    id: firmware-version-min
    attributes:
      label: Firmware Version (Min)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '0.0'
    validations:
      required: false

  - type: input
    id: firmware-version-max
    attributes:
      label: Firmware Version (Max)
      description: Only needed when the same model has multiple definition files split by version range, for example 1.0-2.255 and 3.0+
      placeholder: '255.255'
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        <!-- -->
        ## Device 2 (optional)

  - type: input
    id: brand-2
    attributes:
      label: Brand
    validations:
      required: false

  - type: input
    id: model-2
    attributes:
      label: Model
      placeholder: e.g. ZWA-002
    validations:
      required: false

  - type: input
